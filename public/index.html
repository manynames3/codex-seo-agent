<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>SEO Growth Planner</title>
  <meta name="description" content="Find search opportunities and turn them into a prioritized SEO content plan.">
  <style>
    :root {
      color-scheme: dark;
      --bg: #0b0f14;
      --panel: #111821;
      --panel-2: #17212c;
      --line: #243241;
      --text: #eef6fb;
      --muted: #92a5b4;
      --blue: #55b8ff;
      --green: #4dd899;
      --yellow: #f6c85f;
      --red: #ff6b6b;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      background: var(--bg);
      color: var(--text);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      line-height: 1.5;
    }

    main {
      width: min(1180px, calc(100% - 32px));
      margin: 0 auto;
      padding: 28px 0 40px;
    }

    .topbar, .row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 14px;
    }

    .topbar {
      padding-bottom: 22px;
      border-bottom: 1px solid var(--line);
    }

    .brand { font-weight: 750; }

    .status {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      color: var(--muted);
      font: 12px ui-monospace, SFMono-Regular, Menlo, monospace;
    }

    .status::before {
      content: "";
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--yellow);
      box-shadow: 0 0 12px rgba(246, 200, 95, 0.65);
    }

    .status.ready::before { background: var(--green); box-shadow: 0 0 12px rgba(77, 216, 153, 0.65); }
    .status.error::before { background: var(--red); box-shadow: 0 0 12px rgba(255, 107, 107, 0.65); }

    .grid {
      display: grid;
      grid-template-columns: 420px minmax(0, 1fr);
      gap: 14px;
      margin-top: 22px;
      align-items: start;
    }

    .panel, .card {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
    }

    .panel { padding: 18px; }
    .card { padding: 16px; }

    h1 {
      margin: 0 0 4px;
      font-size: 24px;
      letter-spacing: 0;
    }

    h2 {
      margin: 0 0 14px;
      font-size: 15px;
      letter-spacing: 0;
    }

    h3 {
      margin: 0 0 8px;
      font-size: 14px;
      letter-spacing: 0;
    }

    p, small, label, .hint {
      color: var(--muted);
    }

    label {
      display: block;
      font-size: 12px;
      margin-bottom: 6px;
    }

    input, textarea, button {
      width: 100%;
      border-radius: 7px;
      border: 1px solid var(--line);
      font: inherit;
    }

    input, textarea {
      background: #081018;
      color: var(--text);
      padding: 11px 12px;
      outline: none;
    }

    textarea {
      min-height: 78px;
      resize: vertical;
    }

    input:focus, textarea:focus {
      border-color: #3f83ad;
      box-shadow: 0 0 0 3px rgba(85, 184, 255, 0.12);
    }

    button {
      cursor: pointer;
      background: #1b6a9d;
      color: white;
      border-color: #2d8bc7;
      padding: 11px 13px;
      font-weight: 700;
    }

    button.secondary {
      background: #152232;
      border-color: #2b4055;
      color: #d8e9f4;
    }

    button:disabled {
      cursor: wait;
      opacity: 0.65;
    }

    .field {
      margin-bottom: 13px;
    }

    .actions {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-top: 12px;
    }

    .stacked-actions {
      display: grid;
      gap: 10px;
      margin-top: 12px;
    }

    .cards {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 12px;
    }

    .wide {
      grid-column: 1 / -1;
    }

    .metric-grid {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 10px;
      margin-bottom: 12px;
    }

    .metric {
      background: #0d141d;
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 13px;
      min-height: 94px;
    }

    .metric span {
      display: block;
      color: var(--muted);
      font: 10px ui-monospace, SFMono-Regular, Menlo, monospace;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      margin-bottom: 10px;
    }

    .metric strong {
      display: block;
      font: 650 24px ui-monospace, SFMono-Regular, Menlo, monospace;
    }

    .list {
      display: grid;
      gap: 10px;
    }

    .item {
      background: #0d141d;
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 13px;
    }

    .item p {
      margin: 6px 0 0;
      font-size: 13px;
    }

    .links {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 10px;
    }

    a {
      color: var(--blue);
      text-decoration: none;
    }

    a:hover { text-decoration: underline; }

    .link-button {
      display: inline-flex;
      border: 1px solid #284760;
      background: #122235;
      border-radius: 999px;
      padding: 6px 10px;
      font-size: 12px;
    }

    pre {
      margin: 0;
      max-height: 280px;
      overflow: auto;
      background: #080b0f;
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 12px;
      color: #cde7f7;
      font: 12px/1.55 ui-monospace, SFMono-Regular, Menlo, monospace;
      white-space: pre-wrap;
      word-break: break-word;
    }

    @media (max-width: 980px) {
      .grid, .cards, .metric-grid {
        grid-template-columns: 1fr;
      }

      .topbar, .row {
        align-items: flex-start;
        flex-direction: column;
      }
    }
  </style>
</head>
<body>
  <main>
    <header class="topbar">
      <div class="brand">
        <div>
          <h1>SEO Growth Planner</h1>
          <small>Find search opportunities and turn them into content priorities</small>
        </div>
      </div>
      <div id="status" class="status">Ready</div>
    </header>

    <section class="grid">
      <aside class="panel">
        <h2>Create SEO Plan</h2>
        <div class="field">
          <label for="siteUrl">Website</label>
          <input id="siteUrl" placeholder="example.com">
        </div>

        <div class="stacked-actions">
          <button id="connectBtn" class="secondary">Connect Search Console</button>
          <button id="runBtn">Generate Plan</button>
        </div>

        <h2 style="margin-top:22px">Reports</h2>
        <div id="links" class="links"></div>
      </aside>

      <section class="cards">
        <div class="panel wide">
          <div class="row">
            <div>
              <h2>SEO Snapshot</h2>
              <small id="runMeta">No plan generated yet.</small>
            </div>
            <button id="reportsBtn" class="secondary" style="width:auto">View Latest Reports</button>
          </div>
          <div class="metric-grid" style="margin-top:14px">
            <div class="metric"><span>Impressions</span><strong id="mImpressions">-</strong></div>
            <div class="metric"><span>Opportunities</span><strong id="mGaps">-</strong></div>
            <div class="metric"><span>Avg Position</span><strong id="mPosition">-</strong></div>
            <div class="metric"><span>Clicks</span><strong id="mClicks">-</strong></div>
          </div>
        </div>

        <div class="card">
          <h2>Top Opportunities</h2>
          <div id="keywords" class="list"></div>
        </div>

        <div class="card">
          <h2>Content Plan</h2>
          <div id="contentPlan" class="list"></div>
        </div>

        <div class="card wide">
          <h2>Recent Reports</h2>
          <div id="reports" class="list"></div>
        </div>

        <div class="card wide">
          <h2>Activity</h2>
          <pre id="log">Ready.</pre>
        </div>
      </section>
    </section>
  </main>

  <script>
    const $ = (id) => document.getElementById(id);
    const state = {
      siteUrl: localStorage.getItem("seoAgent.siteUrl") || ""
    };

    $("siteUrl").value = displaySiteUrl(state.siteUrl);

    function setStatus(text, kind = "") {
      const el = $("status");
      el.textContent = text;
      el.className = `status ${kind}`;
    }

    function log(message, data) {
      const stamp = new Date().toLocaleTimeString();
      const details = data ? `\n${JSON.stringify(data, null, 2)}` : "";
      $("log").textContent = `[${stamp}] ${message}${details}\n\n${$("log").textContent}`;
    }

    function normalizeSiteUrl(value) {
      const raw = String(value || "").trim();
      if (!raw) return "";
      if (raw.startsWith("sc-domain:")) return raw;
      if (/^https?:\/\//i.test(raw)) return raw.endsWith("/") ? raw : `${raw}/`;
      return `sc-domain:${raw.replace(/^www\./, "").replace(/\/$/, "")}`;
    }

    function displaySiteUrl(value) {
      return String(value || "").replace(/^sc-domain:/, "");
    }

    function save(options = {}) {
      const silent = options.silent === true;
      state.siteUrl = normalizeSiteUrl($("siteUrl").value);
      localStorage.setItem("seoAgent.siteUrl", state.siteUrl);
      $("siteUrl").value = displaySiteUrl(state.siteUrl);
      if (!silent) {
        setStatus("Saved", "ready");
        log("Saved.");
      }
    }

    function requireSettings() {
      save({ silent: true });
      if (!state.siteUrl) throw new Error("Enter a website first.");
    }

    async function api(path, options = {}) {
      const res = await fetch(path, {
        ...options,
        headers: {
          "content-type": "application/json",
          ...(options.headers || {})
        }
      });
      const text = await res.text();
      let body;
      try { body = JSON.parse(text); } catch { body = text; }
      if (!res.ok) {
        throw new Error(typeof body === "string" ? body : (body.error || `HTTP ${res.status}`));
      }
      return body;
    }

    function setBusy(isBusy) {
      for (const id of ["connectBtn", "runBtn", "reportsBtn"]) {
        $(id).disabled = isBusy;
      }
    }

    function renderLinks(links = {}) {
      const labels = {
        dashboard: "Open Dashboard",
        gap_report: "Keyword Opportunities",
        competitive_report: "Competitor Notes",
        content_plan: "Content Plan"
      };
      $("links").innerHTML = Object.entries(links).map(([key, url]) =>
        `<a class="link-button" href="${url}" target="_blank" rel="noreferrer">${labels[key] || key}</a>`
      ).join("") || "<small>No reports yet.</small>";
    }

    function renderResult(result) {
      const gap = result.gap || {};
      const kpis = gap.kpis || {};
      $("runMeta").textContent = `${displaySiteUrl(result.site_url)} | ${result.date}`;
      $("mImpressions").textContent = Number(kpis.total_impressions || 0).toLocaleString();
      $("mGaps").textContent = Number(kpis.gap_zone_count || 0).toLocaleString();
      $("mPosition").textContent = kpis.avg_position || "-";
      $("mClicks").textContent = Number(kpis.total_clicks || 0).toLocaleString();

      $("keywords").innerHTML = (gap.keywords || []).slice(0, 5).map((kw) => `
        <div class="item">
          <h3>${escapeHtml(kw.keyword)}</h3>
          <small>${kw.impressions.toLocaleString()} impressions | Position ${kw.position} | CTR ${kw.ctr}%</small>
          <p>${escapeHtml(kw.recommendation)}</p>
        </div>
      `).join("") || "<small>No gap-zone keywords found.</small>";

      $("contentPlan").innerHTML = ((result.content_plan || {}).articles || []).map((item) => `
        <div class="item">
          <h3>${escapeHtml(item.priority)} - ${escapeHtml(item.title)}</h3>
          <small>${escapeHtml(item.keyword)} | ${escapeHtml(item.intent)} | ${escapeHtml(item.threat)}</small>
          <p>${escapeHtml(item.brief)}</p>
        </div>
      `).join("") || "<small>No content plan yet.</small>";

      renderLinks(result.links);
    }

    function renderReports(data) {
      $("reports").innerHTML = (data.reports || []).slice(0, 12).map((report) => `
        <div class="item">
          <a href="${report.url}" target="_blank" rel="noreferrer">${escapeHtml(formatReportName(report.key))}</a>
          <p>${new Date(report.last_modified).toLocaleString()} | ${Number(report.size).toLocaleString()} bytes</p>
        </div>
      `).join("") || "<small>No reports found.</small>";
    }

    function formatReportName(key) {
      const name = String(key || "").split("/").pop() || "Report";
      return name
        .replace(/\.[^.]+$/, "")
        .replace(/[-_]+/g, " ")
        .replace(/\b\w/g, (char) => char.toUpperCase());
    }

    function escapeHtml(value) {
      return String(value ?? "").replace(/[&<>"']/g, (char) => ({
        "&": "&amp;",
        "<": "&lt;",
        ">": "&gt;",
        '"': "&quot;",
        "'": "&#39;"
      }[char]));
    }

    $("connectBtn").addEventListener("click", () => {
      try {
        requireSettings();
        const url = `/api/connect?site_url=${encodeURIComponent(state.siteUrl)}`;
        window.open(url, "_blank", "noopener,noreferrer");
        setStatus("Connection opened", "ready");
        log("Opened account connection in a new tab.");
      } catch (error) {
        setStatus("Setup needed", "error");
        log(error.message);
      }
    });

    $("runBtn").addEventListener("click", async () => {
      try {
        requireSettings();
        setBusy(true);
        setStatus("Generating...");
        log("Generating SEO plan. This can take a few minutes.");
        const data = await api("/api/run", {
          method: "POST",
          body: JSON.stringify({ site_url: state.siteUrl })
        });
        renderResult(data);
        setStatus("Plan ready", "ready");
        log("SEO plan generated.");
      } catch (error) {
        setStatus(error.message.includes("website") ? "Website needed" : "Plan failed", "error");
        log(error.message);
      } finally {
        setBusy(false);
      }
    });

    $("reportsBtn").addEventListener("click", async () => {
      try {
        setBusy(true);
        const data = await api("/api/reports");
        renderReports(data);
        setStatus("Reports loaded", "ready");
        log("Latest reports loaded.");
      } catch (error) {
        setStatus("Reports unavailable", "error");
        log(error.message);
      } finally {
        setBusy(false);
      }
    });

    renderLinks();
    renderReports({ reports: [] });
    $("keywords").innerHTML = "<small>No opportunities yet.</small>";
    $("contentPlan").innerHTML = "<small>No content plan yet.</small>";
    setStatus("Ready", "ready");
  </script>
</body>
</html>
